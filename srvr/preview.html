<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Dobinator — Preview</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-reboot.min.css" />
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-utilities.min.css" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body data-running="0" data-status="0">
  <div class="shell">
    <header class="topbar">
      <span class="brand" aria-label="The Dobinator">
        <span class="brand-dot" aria-hidden="true"></span>
        The Dobinator
      </span>
      <button id="powerBtn" class="power-btn" aria-label="Toggle The Dobinator">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 2v10"/>
          <path d="M5.6 6.4a8 8 0 1 0 12.8 0"/>
        </svg>
      </button>
    </header>
    <main id="stage" class="stage" aria-live="polite"></main>
  </div>

  <script type="module">
    import { render } from './assets/js/render.js';
    import { normalizeState } from './assets/js/api.js';

    let last = null;
    window.applyState = function (raw) {
      const state = raw && raw._error ? raw : normalizeState(raw);
      render(state, last);
      last = state;
    };

    // Initial paint: off-state
    window.applyState({ Running: 0, StatusNumber: 0 });

    // Allow parent test harness to drive via postMessage too
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'setState') window.applyState(e.data.state);
    });

    // Tell parent we're ready
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'preview-ready' }, '*');
    }
  </script>
</body>
</html>
