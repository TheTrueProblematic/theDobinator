<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Dobinator — Test Harness</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-reboot.min.css" />
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-utilities.min.css" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="test-shell">
    <aside class="test-controls">
      <h2>Mode</h2>
      <div class="test-toggle" id="runningToggle"></div>

      <h2>Status</h2>
      <div class="test-grid" id="statusButtons"></div>

      <h2>Progress</h2>
      <div id="sliders"></div>

      <h2>Presets</h2>
      <div class="test-grid" id="presets"></div>

      <button id="runAssertions" class="test-run">Run all assertions</button>
      <div id="testResults" class="test-results"></div>
    </aside>

    <section class="test-preview">
      <iframe id="previewFrame" src="preview.html" title="Portal preview"></iframe>
    </section>
  </div>

  <script type="module" src="assets/js/test-harness.js"></script>
</body>
</html>
